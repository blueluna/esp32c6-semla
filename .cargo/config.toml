[target.riscv32imac-unknown-none-elf]
runner = "probe-rs run --chip=esp32c6 --probe 303a:1001:40:4C:CA:47:29:30 --preverify --always-print-stacktrace --no-location --catch-hardfault --idf-partition-table=partitions.csv"

[env]
DEFMT_LOG="info"
SSID=""
PASSWORD=""

[build]
rustflags = [
  # Required to obtain backtraces (e.g. when using the "esp-backtrace" crate.)
  # NOTE: May negatively impact performance of produced code
  "-C", "force-frame-pointers",
]

target = "riscv32imac-unknown-none-elf"

[unstable]
build-std = ["alloc", "core"]
